<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Demo Gestoria Trafico | WhiteMoon IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Inter',sans-serif;background:#07090f;color:#f0f0f8;-webkit-font-smoothing:antialiased}
    :root{
      --p:#7c4dff;--p2:#9d70ff;--p3:#c4b3ff;
      --g:#00d4aa;--g2:#00a07a;
      --bg:#07090f;--bg2:#0e0e1a;--bg3:#141428;
      --border:rgba(124,77,255,.22);--bs:rgba(124,77,255,.1);
      --text:#f0f0f8;--muted:#8888a8;--muted2:#4a4a6a;
    }

    /* ── STARS ── */
    #star-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}

    /* ── LAYOUT ── */
    .app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;padding:0 0 24px}

    /* ── HEADER ── */
    .header{text-align:center;padding:28px 24px 18px;background:linear-gradient(180deg,rgba(124,77,255,.14) 0%,transparent 100%);border-bottom:1px solid var(--bs)}
    .header-logo{width:58px;height:58px;border-radius:50%;object-fit:cover;margin-bottom:8px;border:2px solid rgba(124,77,255,.4);box-shadow:0 0 24px rgba(124,77,255,.35)}
    .header-name{font-size:1.1rem;font-weight:800;color:var(--text);letter-spacing:-.01em;margin-bottom:2px}
    .header-sub{font-size:.73rem;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:5px}
    .online-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:bl 2s infinite}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── CHAT ── */
    #chat-msgs{flex:1;overflow-y:auto;padding:16px 14px 10px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
    #chat-msgs::-webkit-scrollbar{width:3px}
    #chat-msgs::-webkit-scrollbar-thumb{background:rgba(124,77,255,.3);border-radius:2px}
    .msg{display:flex;animation:mi .22s ease}
    @keyframes mi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
    .msg.bot{justify-content:flex-start}
    .msg.user{justify-content:flex-end}
    .bot-av{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-right:7px;margin-top:auto;border:1px solid rgba(124,77,255,.35)}
    .bubble{max-width:85%;padding:11px 14px;border-radius:16px;font-size:.87rem;line-height:1.58}
    .msg.bot .bubble{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px}
    .msg.user .bubble{background:linear-gradient(135deg,var(--p),#a855f7);color:#fff;border-bottom-right-radius:3px;font-weight:500}
    .typing-wrap{display:flex;align-items:flex-end}
    .typing-b{background:var(--bg2);border:1px solid var(--border);padding:12px 16px;border-radius:16px;border-bottom-left-radius:3px;display:flex;gap:4px;align-items:center}
    .td{width:6px;height:6px;border-radius:50%;background:var(--p2);animation:td 1.2s infinite}
    .td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
    @keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    /* ── QUICK REPLIES ── */
    #qr-wrap{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:7px}
    .qr-btn{background:rgba(124,77,255,.09);border:1px solid var(--border);color:var(--p3);padding:8px 14px;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .qr-btn:active,.qr-btn:hover{background:rgba(124,77,255,.22);color:#fff;border-color:rgba(124,77,255,.5)}

    /* ── INPUT ── */
    .input-bar{display:flex;gap:9px;padding:10px 14px;background:var(--bg);border-top:1px solid var(--bs);position:sticky;bottom:0}
    #chat-in{flex:1;padding:10px 14px;background:var(--bg2);border:1px solid rgba(124,77,255,.18);border-radius:22px;color:var(--text);font-family:inherit;font-size:.87rem;outline:none;transition:border-color .2s}
    #chat-in:focus{border-color:rgba(124,77,255,.5)}
    #chat-in::placeholder{color:var(--muted2)}
    #send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--p),#a855f7);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;transition:all .2s}
    #send-btn:active{transform:scale(.9)}

    /* ── SPECIAL CARDS ── */
    .info-card{background:rgba(124,77,255,.06);border:1px solid rgba(124,77,255,.2);border-radius:12px;padding:14px 16px;margin:3px 0}
    .info-card-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--p2);margin-bottom:10px}
    .info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(124,77,255,.08);font-size:.82rem}
    .info-row:last-child{border-bottom:none}
    .info-lbl{color:var(--muted)}
    .info-val{color:var(--text);font-weight:600}

    .req-card{background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);border-radius:12px;padding:14px 16px;margin:3px 0}
    .req-card-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g);margin-bottom:10px}
    .req-item{display:flex;gap:9px;align-items:flex-start;padding:5px 0;font-size:.82rem;color:var(--muted);border-bottom:1px solid rgba(0,212,170,.06)}
    .req-item:last-child{border-bottom:none}
    .req-item::before{content:'✓';color:var(--g);font-weight:700;flex-shrink:0;font-size:.78rem;margin-top:1px}

    .success-card{background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.25);border-radius:14px;padding:20px;text-align:center;margin:4px 0}
    .success-icon{font-size:2.2rem;margin-bottom:10px}
    .success-card h3{font-size:1rem;font-weight:700;color:var(--g);margin-bottom:8px}
    .success-card p{font-size:.83rem;color:var(--muted);line-height:1.6}
    .success-note{margin-top:12px;padding:10px 12px;background:rgba(124,77,255,.08);border:1px solid var(--bs);border-radius:9px;font-size:.78rem;color:var(--p3);text-align:left}

    .faq-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:3px 0}
    .faq-q{font-size:.84rem;font-weight:700;color:var(--p3);margin-bottom:6px}
    .faq-a{font-size:.82rem;color:var(--muted);line-height:1.6}

    .powered{text-align:center;font-size:.63rem;color:rgba(255,255,255,.15);padding:5px 16px 0}
    .powered a{color:rgba(124,77,255,.4);text-decoration:none}
  </style>
</head>

// ── UI ──
function addMsg(who,html){
  var c=document.getElementById('chat-msgs');
  var d=document.createElement('div');d.className='msg '+who;
  if(who==='bot'){var av=document.createElement('img');av.src=LOGO;av.className='bot-av';d.appendChild(av);}
  var b=document.createElement('div');b.className='bubble';b.innerHTML=html;
  d.appendChild(b);c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function addWidget(el){
  var c=document.getElementById('chat-msgs');
  var d=document.createElement('div');d.className='msg bot';
  var av=document.createElement('img');av.src=LOGO;av.className='bot-av';
  d.appendChild(av);d.appendChild(el);
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function showTyping(){
  var c=document.getElementById('chat-msgs');
  var d=document.createElement('div');d.className='msg bot';d.id='typing';
  var av=document.createElement('img');av.src=LOGO;av.className='bot-av';
  var tw=document.createElement('div');tw.className='typing-wrap';
  var tb=document.createElement('div');tb.className='typing-b';
  tb.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  tw.appendChild(tb);d.appendChild(av);d.appendChild(tw);c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}
function hideTyping(){var t=document.getElementById('typing');if(t)t.remove();}
function setQR(arr){
  var w=document.getElementById('qr-wrap');w.innerHTML='';
  arr.forEach(function(l){
    var b=document.createElement('button');b.className='qr-btn';b.textContent=l;
    b.onclick=function(){handleReply(l);};w.appendChild(b);
  });
}
function botSay(html,qrs,delay){
  if(!qrs)qrs=[];if(!delay)delay=850;
  showTyping();
  setTimeout(function(){hideTyping();addMsg('bot',html);if(qrs.length)setQR(qrs);else setQR([]);},delay);
}
function handleReply(text){setQR([]);addMsg('user',text);processInput(text);}

// ── DOCUMENTACION CARD ──
function docCard(tipo){
  var docs={
    transferencia:[
      'DNI/NIE del comprador y vendedor (fotocopia)',
      'Permiso de circulacion original del vehiculo',
      'Ficha tecnica / tarjeta ITV en vigor',
      'Contrato de compraventa firmado por ambas partes',
      'Justificante de pago del impuesto de transmisiones (ITP)',
      'Ultimo recibo del IVTM (impuesto de circulacion) pagado',
      'Numero de referencia catastral si hay hipoteca sobre el vehiculo'
    ],
    baja:[
      'DNI/NIE del titular',
      'Permiso de circulacion original',
      'Placas de matricula del vehiculo'
    ],
    duplicado:[
      'DNI/NIE del titular',
      'Denuncia en caso de robo o extravío',
      'Justificante de pago de la tasa correspondiente'
    ],
    cambiodomicilio:[
      'DNI/NIE del titular (con nueva direccion)',
      'Permiso de circulacion original',
      'Justificante de residencia (empadronamiento)'
    ]
  };
  var lista=docs[tipo]||docs.transferencia;
  var el=document.createElement('div');el.className='req-card';
  var t=document.createElement('div');t.className='req-card-title';t.textContent='Documentacion necesaria';
  el.appendChild(t);
  lista.forEach(function(d){
    var r=document.createElement('div');r.className='req-item';r.textContent=d;el.appendChild(r);
  });
  return el;
}

// ── RESUMEN EXPEDIENTE ──
function resumenCard(){
  var el=document.createElement('div');el.className='info-card';
  var t=document.createElement('div');t.className='info-card-title';t.textContent='Resumen del expediente';
  el.appendChild(t);
  var rows=[
    ['Tramite',state.tipo],
    ['Nombre',state.nombre],
    ['Telefono',state.tel],
    ['DNI/NIE',state.dni||'Pendiente'],
    ['Matricula',state.matricula||'Pendiente'],
  ];
  rows.forEach(function(r){
    var d=document.createElement('div');d.className='info-row';
    d.innerHTML='<span class="info-lbl">'+r[0]+'</span><span class="info-val">'+r[1]+'</span>';
    el.appendChild(d);
  });
  return el;
}

function successCard(){

    '.%20Nombre%3A%20'+encodeURIComponent(state.nombre)+

}

// ── FLUJO PRINCIPAL ──
function processInput(t){
  var tl=t.toLowerCase();

  if(state.step==='start'||state.step==='menu'){
    if(tl.indexOf('transferen')!==-1||tl.indexOf('compra')!==-1||tl.indexOf('venta')!==-1||tl.indexOf('vendo')!==-1||tl.indexOf('compro')!==-1){
      state.tipo='Transferencia de vehiculo';state.step='menu';
      showTyping();
      setTimeout(function(){
        hideTyping();
        addMsg('bot','Perfecto, te ayudo con la <b>transferencia de vehiculo</b>.<br><br>Estos son los documentos que necesitaras:');
        addWidget(docCard('transferencia'));
        setQR(['Iniciar tramite','Ver precio','Cuanto tarda','Otras consultas']);
      },900);

    } else if(tl.indexOf('baja')!==-1){
      state.tipo='Baja de vehiculo';state.step='menu';
      showTyping();
      setTimeout(function(){
        hideTyping();
        addMsg('bot','Te informo sobre la <b>baja de vehiculo</b>.<br><br>Documentacion necesaria:');
        addWidget(docCard('baja'));
        setQR(['Iniciar tramite','Ver precio','Otras consultas']);
      },900);

    } else if(tl.indexOf('duplicado')!==-1||tl.indexOf('extraviad')!==-1||tl.indexOf('perdid')!==-1){
      state.tipo='Duplicado de permiso';state.step='menu';
      showTyping();
      setTimeout(function(){
        hideTyping();
        addMsg('bot','Te ayudo con el <b>duplicado del permiso de circulacion</b>.<br><br>Necesitaras:');
        addWidget(docCard('duplicado'));
        setQR(['Iniciar tramite','Ver precio','Otras consultas']);
      },900);

    } else if(tl.indexOf('domicilio')!==-1||tl.indexOf('direccion')!==-1||tl.indexOf('cambio')!==-1){
      state.tipo='Cambio de domicilio';state.step='menu';
      showTyping();
      setTimeout(function(){
        hideTyping();
        addMsg('bot','Para el <b>cambio de domicilio</b> en el permiso de circulacion necesitaras:');
        addWidget(docCard('cambiodomicilio'));
        setQR(['Iniciar tramite','Ver precio','Otras consultas']);
      },900);

    } else if(tl.indexOf('precio')!==-1||tl.indexOf('cuanto')!==-1||tl.indexOf('coste')!==-1||tl.indexOf('tarifa')!==-1){
      showTyping();
      setTimeout(function(){
        hideTyping();
        addMsg('bot','Aqui tienes nuestras <b>tarifas orientativas</b>:');
        addWidget(tarifaCard());
        setQR(['Iniciar tramite','Otras consultas']);
      },900);

    } else if(tl.indexOf('itv')!==-1){
      showTyping();
      setTimeout(function(){
        hideTyping();
        var el=faqCard(
          'Necesito pasar la ITV, me podeis ayudar?',
          'Si, gestionamos cita previa para ITV y te acompanamos si lo necesitas. El precio del servicio es desde 60€ + el coste de la propia ITV. Necesitamos la matricula y los datos del titular. Si el vehiculo no esta a tu nombre necesitaras una autorizacion del titular.'
        );
        addWidget(el);
        setQR(['Iniciar tramite ITV','Ver otros tramites']);
      },900);

    } else if(tl.indexOf('impuest')!==-1||tl.indexOf('itp')!==-1||tl.indexOf('ivtm')!==-1){
      showTyping();
      setTimeout(function(){
        hideTyping();
        var el=faqCard(
          'Que impuestos hay que pagar en una transferencia?',
          'En una transferencia de vehiculo de segunda mano hay dos impuestos principales:<br><br><b>ITP (Impuesto de Transmisiones Patrimoniales):</b> lo paga el comprador, generalmente el 4% del valor fiscal del vehiculo segun tablas de Hacienda.<br><br><b>IVTM (Impuesto de circulacion):</b> se prorratea entre vendedor y comprador segun los dias del ano. Nosotros lo calculamos y gestionamos todo.'
        );
        addWidget(el);
        setQR(['Iniciar tramite','Cuanto cuesta','Otras consultas']);
      },900);

    } else if(tl.indexOf('tiempo')!==-1||tl.indexOf('tarda')!==-1||tl.indexOf('plazo')!==-1){
      botSay('Los plazos habituales para los tramites mas comunes son:<br><br>&#128336; <b>Transferencia:</b> 3 a 7 dias habiles<br>&#128336; <b>Baja:</b> 1 a 3 dias habiles<br>&#128336; <b>Duplicado permiso:</b> 2 a 5 dias habiles<br>&#128336; <b>Cambio domicilio:</b> 1 a 3 dias habiles<br><br>Los plazos dependen de la DGT y la comunidad autonoma. Tramites urgentes disponibles con coste adicional.',
        ['Iniciar tramite','Ver precios','Otras consultas']);

    } else if(tl.indexOf('iniciar')!==-1||tl.indexOf('tramitar')!==-1||tl.indexOf('gestionar')!==-1||tl.indexOf('tramite')!==-1){
      if(!state.tipo)state.tipo='Tramite de trafico';
      state.step='ask_nombre';
      botSay('Perfecto, vamos a abrir tu expediente.<br><br>Para que un gestor te contacte necesito algunos datos. &iquest;Me dices tu nombre completo?');

    } else if(tl.indexOf('ver otros')!==-1||tl.indexOf('otras')!==-1||tl.indexOf('que tramites')!==-1){
      state.step='menu';
      botSay('Estos son los tramites que gestionamos:<br><br>&#128663; <b>Transferencia</b> (compra/venta de vehiculo)<br>&#128663; <b>Baja</b> de vehiculo (definitiva o temporal)<br>&#128663; <b>Duplicado</b> del permiso de circulacion<br>&#128663; <b>Cambio de domicilio</b> en el permiso<br>&#128663; <b>ITV</b> (cita y gestion)<br>&#128663; <b>Impuestos</b> (ITP, IVTM)<br><br>&iquest;Cual te interesa?',
        ['Transferencia de coche','Baja de vehiculo','Duplicado permiso','ITV','Ver precios']);

    } else {
      state.step='menu';
      botSay('Hola, soy el <b>Agente IA</b> de la gestoria. Puedo resolver tus dudas sobre tramites de trafico y abrir tu expediente para que un gestor te llame.<br><br>&iquest;Que necesitas hoy?',
        ['Transferencia de coche','Baja de vehiculo','Duplicado permiso','Ver precios','Cuanto tiempo tardan']);
    }

  } else if(state.step==='ask_nombre'){
    state.nombre=t;state.step='ask_tel';
    botSay('Hola <b>'+t+'</b>. &iquest;Cual es tu numero de telefono para que el gestor te llame?');

  } else if(state.step==='ask_tel'){
    state.tel=t;state.step='ask_matricula';
    botSay('Anotado. &iquest;Cual es la matricula del vehiculo? (si ya la tienes).',['No la tengo ahora']);

  } else if(state.step==='ask_matricula'){
    state.matricula=(t==='No la tengo ahora')?'Pendiente':t;
    state.step='ask_dni';
    botSay('Perfecto. &iquest;Tu DNI o NIE? Lo necesitamos para identificar el expediente.',['Prefiero darlo despues']);

  } else if(state.step==='ask_dni'){
    state.dni=(t==='Prefiero darlo despues')?'Pendiente':t;
    state.step='ask_motivo';
    botSay('Casi listo. &iquest;Algo mas que quieras indicarle al gestor? (urgencia, dudas especificas...)',['Sin comentarios adicionales']);

  } else if(state.step==='ask_motivo'){
    state.step='confirm';
    showTyping();
    setTimeout(function(){
      hideTyping();
      addMsg('bot','Perfecto. Revisa el resumen de tu expediente:');
      addWidget(resumenCard());
      setQR(['Confirmar expediente','Corregir datos']);
    },700);

  } else if(state.step==='confirm'){
    if(tl.indexOf('confirm')!==-1||tl.indexOf('si')!==-1||tl.indexOf('correcto')!==-1){
      state.step='done';
      showTyping();
      setTimeout(function(){
        hideTyping();
        addWidget(successCard());
        setQR(['Nuevo tramite','Ver documentacion']);
      },1800);
    } else if(tl.indexOf('corregir')!==-1||tl.indexOf('no')!==-1){
      state={step:'ask_nombre',nombre:'',tel:'',dni:'',matricula:'',tipo:state.tipo};
      botSay('Sin problema, volvemos a empezar. &iquest;Tu nombre completo?');
    }

  } else if(state.step==='done'){
    if(tl.indexOf('nuevo')!==-1){
      state={step:'start',nombre:'',tel:'',dni:'',matricula:'',tipo:''};
      botSay('Claro, empezamos un nuevo tramite. &iquest;Que necesitas?',
        ['Transferencia de coche','Baja de vehiculo','Duplicado permiso','Ver precios']);
    } else if(tl.indexOf('documentacion')!==-1||tl.indexOf('documentos')!==-1){
      showTyping();
      setTimeout(function(){
        hideTyping();
        addMsg('bot','Aqui tienes la documentacion para tu tramite:');
        addWidget(docCard(state.tipo.indexOf('Transferencia')!==-1?'transferencia':state.tipo.indexOf('Baja')!==-1?'baja':state.tipo.indexOf('Duplicado')!==-1?'duplicado':'cambiodomicilio'));
        setQR(['Nuevo tramite']);
      },800);
    } else {
      botSay('Tu expediente ya esta registrado. Un gestor te llamara pronto. &iquest;Puedo ayudarte con algo mas?',
        ['Nuevo tramite','Ver documentacion']);
    }

  } else {
    state={step:'start',nombre:'',tel:'',dni:'',matricula:'',tipo:''};
    botSay('Hola, soy el Agente IA de la gestoria. &iquest;En que puedo ayudarte?',
      ['Transferencia de coche','Baja de vehiculo','Duplicado permiso','Ver precios']);
  }
}

document.getElementById('send-btn').onclick=function(){var i=document.getElementById('chat-in');var t=i.value.trim();if(!t)return;i.value='';handleReply(t);};
document.getElementById('chat-in').addEventListener('keypress',function(e){if(e.key==='Enter'){var i=document.getElementById('chat-in');var t=i.value.trim();if(!t)return;i.value='';handleReply(t);}});

window.addEventListener('load',function(){
  setTimeout(function(){
    botSay('Hola! Soy el <b>Agente IA</b> de la gestoria de trafico.<br><br>Puedo resolver tus dudas sobre cualquier tramite y abrir tu expediente para que un <b>gestor te llame</b> y lo tramite todo.<br><br>&iquest;Que necesitas hoy?',
      ['Transferencia de coche','Baja de vehiculo','Duplicado permiso','Ver precios','Cuanto tiempo tardan'],600);
  },400);
});
</script>
